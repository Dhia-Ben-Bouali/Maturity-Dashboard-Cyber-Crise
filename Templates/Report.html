<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial;
        padding: 40px;
      }

      h1 {
        color: #1e293b;
      }

      .card {
        border: 1px solid #ccc;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 10px;
      }

      th {
        background: #f1f5f9;
      }
    </style>
  </head>
  <body>
    <h2>Summary</h2>

    {% for card in cards %}
    <div><strong>{{ card.title }}</strong> : {{ card.value }}</div>
    {% endfor %}

    <h2>Maturity Level</h2>
    <p>{{ maturity_label }}</p>

    <h2>Domain Scores</h2>

    <table>
      <tr>
        <th>Domain</th>
        <th>Score</th>
      </tr>

      {% for domain in domain_scores %}
      <tr>
        <td>{{ domain.domain }}</td>
        <td>{{ domain.score }} %</td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
